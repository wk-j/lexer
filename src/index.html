<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lexer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="content-panel" id="content">
      <div class="empty-state">
        <h1>Lexer</h1>
        <p>Open a Markdown file to get started.</p>
        <p class="hint">Drag &amp; drop a <code>.md</code> file, or press <kbd>Ctrl+O</kbd></p>
      </div>
    </div>
    <div class="status-bar" id="status-bar">
      <span class="status-file" id="status-file">No file open</span>
      <span class="status-right" id="status-right"></span>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
